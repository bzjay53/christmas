[build]
  base = "web-dashboard"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  VITE_NODE_ENV = "production"
  VITE_APP_NAME = "Christmas Trading"
  VITE_APP_VERSION = "2.0.0"
  VITE_APP_URL = "https://christmas-protocol.netlify.app"
  # Supabase 환경변수는 Netlify 대시보드에서 설정
  # VITE_SUPABASE_URL = "your_supabase_url_here"
  # VITE_SUPABASE_ANON_KEY = "your_supabase_anon_key_here"
  VITE_API_BASE_URL = "https://christmas-protocol.netlify.app/api"
  VITE_ENABLE_DEMO_MODE = "true"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_ENABLE_REAL_TRADING = "false"

# SPA 라우팅을 위한 리디렉트 설정
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 정적 파일 캐싱 설정
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 