[build]
  base = "web-dashboard"
  command = "cd web-dashboard; npm ci; npx vite build"
  publish = "web-dashboard/dist"
  node_bundler = "esbuild"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--prefer-offline --no-audit"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**/*"]
  external_node_modules = ["sharp"]

[functions.api-proxy]
  node_bundler = "esbuild"

# 🔗 API 프록시 라우팅 (로깅 강화)
[[redirects]]
  from = "/api/proxy/*"
  to = "/.netlify/functions/api-proxy"
  status = 200
  force = true
  headers = {X-Frame-Options = "DENY", X-Content-Type-Options = "nosniff"}

# 🏠 SPA 라우팅
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 🔒 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' http://31.220.83.213:8000 https:; font-src 'self' https:;"

# 🚀 성능 최적화
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 🔧 Functions 헤더
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://christmas-protocol.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With" 