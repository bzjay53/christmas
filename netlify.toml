[build]
  publish = "web-dashboard/dist"
  command = "cd web-dashboard && npm run build"

[build.environment]
  NODE_VERSION = "18"
  # 보안 강화: Supabase 키 제거됨
  VITE_NODE_ENV = "production"
  VITE_API_BASE_URL = "http://31.220.83.213:8000"
  VITE_DEBUG_MODE = "false"
  VITE_ENABLE_DEV_TOOLS = "false"

[functions]
  directory = "netlify/functions"

# API 프록시 라우팅 (순서 중요! 더 구체적인 것부터)
[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/api-proxy"
  status = 200

[[redirects]]
  from = "/api/proxy/*"
  to = "/.netlify/functions/api-proxy/:splat"
  status = 200

# SPA 폴백 (마지막에 위치)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 🔒 보안 강화: Supabase 키 제거됨 - 백엔드 프록시만 사용
# 환경변수는 Netlify 대시보드에서 설정:
# VITE_API_BASE_URL=http://31.220.83.213:8000 (설정됨)
# VITE_SUPABASE_URL=REMOVED_FOR_SECURITY (제거됨)
# VITE_SUPABASE_ANON_KEY=REMOVED_FOR_SECURITY (제거됨)