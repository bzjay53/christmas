[build]
  base = "web-dashboard"
  command = "npm ci --force && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps --force"
  VITE_NODE_ENV = "production"
  VITE_APP_NAME = "Christmas Trading"
  VITE_APP_VERSION = "2.0.0"
  VITE_APP_URL = "https://christmas-protocol.netlify.app"
  VITE_SUPABASE_URL = "https://qehzzsxzjijfzqkysazc.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaHp6c3h6amlqZnpxa3lzYXpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwNTgxMTQsImV4cCI6MjA2MzYzNDExNH0.zjrrUaVajb9fV1NRwzA_RMy3-r3Lpww9Uen-cZYXDuE"
  VITE_API_BASE_URL = "https://christmas-protocol.netlify.app/api"
  VITE_ENABLE_DEMO_MODE = "true"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_ENABLE_REAL_TRADING = "false"

# SPA 라우팅을 위한 리디렉트 설정
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 정적 파일 캐싱 설정
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 