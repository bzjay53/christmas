<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/christmas-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Christmas Trading - AI 기반 자동매매 시스템" />
    <meta name="keywords" content="trading, AI, 자동매매, 주식, 투자, KIS API" />
    <meta name="author" content="Christmas Trading Team" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Christmas Trading - AI 자동매매 시스템" />
    <meta property="og:description" content="AI 기반 스마트 자동매매로 수익을 극대화하세요" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://christmas-protocol.netlify.app" />
    <meta property="og:image" content="/christmas-og-image.png" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Christmas Trading - AI 자동매매 시스템" />
    <meta name="twitter:description" content="AI 기반 스마트 자동매매로 수익을 극대화하세요" />
    <meta name="twitter:image" content="/christmas-og-image.png" />
    
    <title>Christmas Trading - AI 자동매매 시스템</title>
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Critical CSS for faster initial render */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #333;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
      }
      
      /* Loading spinner */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        color: white;
        margin-top: 20px;
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback loading UI -->
      <div class="loading-container">
        <div>
          <div class="loading-spinner"></div>
          <div class="loading-text">🎄 Christmas Trading 로딩 중...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
