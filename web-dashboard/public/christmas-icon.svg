<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3009;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tree Trunk -->
  <rect x="28" y="50" width="8" height="10" fill="#8B4513" />
  
  <!-- Tree Body (3 layers) -->
  <!-- Bottom layer -->
  <polygon points="32,50 18,50 25,35 39,35" fill="url(#treeGrad)" />
  
  <!-- Middle layer -->
  <polygon points="32,42 20,42 26,30 38,30" fill="url(#treeGrad)" />
  
  <!-- Top layer -->
  <polygon points="32,35 22,35 27,22 37,22" fill="url(#treeGrad)" />
  
  <!-- Star on top -->
  <polygon points="32,20 33.5,16 37,16 34.2,13.5 35.5,10 32,12 28.5,10 29.8,13.5 27,16 30.5,16" fill="url(#starGrad)" stroke="#ffb300" stroke-width="0.5"/>
  
  <!-- Ornaments -->
  <circle cx="28" cy="32" r="2" fill="#ff0000" />
  <circle cx="36" cy="34" r="2" fill="#0066cc" />
  <circle cx="25" cy="42" r="2" fill="#ff0000" />
  <circle cx="35" cy="45" r="2" fill="#ffd700" />
  <circle cx="30" cy="38" r="2" fill="#0066cc" />
  
  <!-- Trading Chart Symbol (subtle) -->
  <g opacity="0.3">
    <polyline points="45,45 48,42 52,46 55,40 58,44" stroke="#00ff00" stroke-width="2" fill="none"/>
    <text x="45" y="55" font-family="monospace" font-size="8" fill="#333">₩</text>
  </g>
  
  <!-- Christmas Trading Text Effect -->
  <text x="32" y="8" text-anchor="middle" font-family="serif" font-size="6" fill="#2d5016" font-weight="bold">CHRISTMAS</text>
</svg> 